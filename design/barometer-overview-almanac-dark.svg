<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1680 905" font-family="'Hanken Grotesk',Verdana,ui-sans-serif,sans-serif">
  <defs>
    <radialGradient id="glow" cx="50%" cy="0%" r="75%">
      <stop offset="0" stop-color="#56c7e8" stop-opacity="0.13"/>
      <stop offset="0.6" stop-color="#56c7e8" stop-opacity="0"/>
    </radialGradient>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="160%"><feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000000" flood-opacity="0.55"/></filter>
    <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1680" height="905" fill="#0a0e15"/>
  <rect x="0" y="0" width="1680" height="520" fill="url(#glow)"/>

  <!-- ===== HEADER ===== -->
  <g transform="translate(40,32) scale(3.8)" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="8.4" stroke="#56c7e8" stroke-width="1.7"/>
    <path d="M12 3.2V4.6" stroke="#56c7e8" stroke-width="1.4" opacity=".5"/>
    <path d="M20.5 12H19.1" stroke="#56c7e8" stroke-width="1.4" opacity=".5"/>
    <path d="M3.5 12H4.9" stroke="#56c7e8" stroke-width="1.4" opacity=".5"/>
    <path d="M12 12L16.8 7.6" stroke="#ec8b4f" stroke-width="1.9"/>
    <circle cx="12" cy="12" r="1.55" fill="#56c7e8"/>
  </g>
  <text x="156" y="96" font-family="'Space Grotesk',Verdana,sans-serif" font-size="52" font-weight="600" fill="#e8eef6" letter-spacing="-0.5">Barometer</text>
  <text x="160" y="126" font-size="15" font-weight="600" fill="#56c7e8" letter-spacing="4">INTERNET HEALTH MONITORING</text>
  <line x1="1080" y1="42" x2="1080" y2="132" stroke="#243042" stroke-width="1.5"/>
  <text x="1108" y="68" font-size="19" fill="#9aa7b9">Real-time status &amp; history for the</text>
  <text x="1108" y="94" font-size="19" fill="#9aa7b9">services you rely on.</text>
  <text x="1108" y="124" font-family="'Space Grotesk',Verdana,sans-serif" font-size="20" font-weight="600" fill="#56c7e8">Fast. Serverless. Reliable.</text>

  <!-- ===== FEEDS PANEL ===== -->
  <rect x="30" y="205" width="250" height="600" rx="16" fill="#121925" stroke="#243042" stroke-width="1.2" filter="url(#sh)"/>
  <text x="48" y="238" font-size="13" font-weight="600" fill="#56c7e8" letter-spacing="2">9 PUBLIC STATUS FEEDS</text>
  <g>
    <!-- rows: tile + name -->
    <g font-family="'Space Grotesk',Verdana,sans-serif">
      <rect x="40" y="250" width="232" height="52" rx="10" fill="#0e1521" stroke="#1b2533"/><rect x="52" y="259" width="34" height="34" rx="8" fill="#16323b" stroke="#2f5763"/><text x="69" y="281" font-size="11" font-weight="600" fill="#56c7e8" text-anchor="middle">AWS</text><text x="98" y="282" font-size="16" font-weight="600" fill="#e8eef6">AWS</text>
      <rect x="40" y="310" width="232" height="52" rx="10" fill="#0e1521" stroke="#1b2533"/><rect x="52" y="319" width="34" height="34" rx="8" fill="#16323b" stroke="#2f5763"/><text x="69" y="341" font-size="12" font-weight="600" fill="#56c7e8" text-anchor="middle">Az</text><text x="98" y="342" font-size="16" font-weight="600" fill="#e8eef6">Microsoft Azure</text>
      <rect x="40" y="370" width="232" height="52" rx="10" fill="#0e1521" stroke="#1b2533"/><rect x="52" y="379" width="34" height="34" rx="8" fill="#16323b" stroke="#2f5763"/><text x="69" y="401" font-size="12" font-weight="600" fill="#56c7e8" text-anchor="middle">GC</text><text x="98" y="402" font-size="16" font-weight="600" fill="#e8eef6">Google Cloud</text>
      <rect x="40" y="430" width="232" height="52" rx="10" fill="#0e1521" stroke="#1b2533"/><rect x="52" y="439" width="34" height="34" rx="8" fill="#16323b" stroke="#2f5763"/><text x="69" y="461" font-size="12" font-weight="600" fill="#56c7e8" text-anchor="middle">CF</text><text x="98" y="462" font-size="16" font-weight="600" fill="#e8eef6">Cloudflare</text>
      <rect x="40" y="490" width="232" height="52" rx="10" fill="#0e1521" stroke="#1b2533"/><rect x="52" y="499" width="34" height="34" rx="8" fill="#16323b" stroke="#2f5763"/><text x="69" y="521" font-size="12" font-weight="600" fill="#56c7e8" text-anchor="middle">GH</text><text x="98" y="522" font-size="16" font-weight="600" fill="#e8eef6">GitHub</text>
      <rect x="40" y="550" width="232" height="52" rx="10" fill="#0e1521" stroke="#1b2533"/><rect x="52" y="559" width="34" height="34" rx="8" fill="#16323b" stroke="#2f5763"/><text x="69" y="581" font-size="12" font-weight="600" fill="#56c7e8" text-anchor="middle">AI</text><text x="98" y="582" font-size="16" font-weight="600" fill="#e8eef6">OpenAI</text>
      <rect x="40" y="610" width="232" height="52" rx="10" fill="#0e1521" stroke="#1b2533"/><rect x="52" y="619" width="34" height="34" rx="8" fill="#16323b" stroke="#2f5763"/><text x="69" y="641" font-size="12" font-weight="600" fill="#56c7e8" text-anchor="middle">An</text><text x="98" y="642" font-size="16" font-weight="600" fill="#e8eef6">Anthropic</text>
      <rect x="40" y="670" width="232" height="52" rx="10" fill="#0e1521" stroke="#1b2533"/><rect x="52" y="679" width="34" height="34" rx="8" fill="#16323b" stroke="#2f5763"/><text x="69" y="701" font-size="12" font-weight="600" fill="#56c7e8" text-anchor="middle">Vc</text><text x="98" y="702" font-size="16" font-weight="600" fill="#e8eef6">Vercel</text>
      <rect x="40" y="730" width="232" height="52" rx="10" fill="#0e1521" stroke="#1b2533"/><rect x="52" y="739" width="34" height="34" rx="8" fill="#16323b" stroke="#2f5763"/><text x="69" y="761" font-size="12" font-weight="600" fill="#56c7e8" text-anchor="middle">DO</text><text x="98" y="762" font-size="16" font-weight="600" fill="#e8eef6">DigitalOcean</text>
    </g>
  </g>
  <!-- feed bus -> cloud -->
  <g stroke="#56c7e8" stroke-width="1.4" fill="none" opacity="0.55">
    <line x1="272" y1="276" x2="300" y2="276"/><line x1="272" y1="336" x2="300" y2="336"/><line x1="272" y1="396" x2="300" y2="396"/><line x1="272" y1="456" x2="300" y2="456"/><line x1="272" y1="516" x2="300" y2="516"/><line x1="272" y1="576" x2="300" y2="576"/><line x1="272" y1="636" x2="300" y2="636"/><line x1="272" y1="696" x2="300" y2="696"/><line x1="272" y1="756" x2="300" y2="756"/>
    <line x1="300" y1="276" x2="300" y2="756"/>
  </g>
  <line x1="300" y1="516" x2="327" y2="516" stroke="#56c7e8" stroke-width="2" marker-end="url(#ah)"/>
  <text x="150" y="855" font-size="12" fill="#647184">HTTPS (public) &#8212; adapters degrade to &#8220;unknown&#8221; on any failure</text>

  <!-- ===== AWS CLOUD ===== -->
  <rect x="330" y="175" width="772" height="688" rx="18" fill="#121925" stroke="#34465c" stroke-width="1.3" filter="url(#sh)"/>
  <text x="356" y="208" font-family="'Space Grotesk',Verdana,sans-serif" font-size="17" font-weight="600" fill="#9aa7b9">AWS Cloud</text>
  <text x="356" y="228" font-size="12" fill="#647184">us-east-1 &#183; serverless, single-writer</text>

  <!-- EventBridge -->
  <rect x="358" y="345" width="172" height="210" rx="14" fill="#121925" stroke="#ec8b4f" stroke-width="1.4"/>
  <circle cx="402" cy="400" r="17" fill="none" stroke="#ec8b4f" stroke-width="2"/>
  <line x1="402" y1="400" x2="402" y2="390" stroke="#ec8b4f" stroke-width="2" stroke-linecap="round"/>
  <line x1="402" y1="400" x2="410" y2="404" stroke="#ec8b4f" stroke-width="2" stroke-linecap="round"/>
  <text x="432" y="396" font-size="12" fill="#9aa7b9">Amazon</text>
  <text x="432" y="414" font-family="'Space Grotesk',Verdana,sans-serif" font-size="16" font-weight="600" fill="#e8eef6">EventBridge</text>
  <rect x="376" y="500" width="136" height="34" rx="17" fill="#271c12" stroke="#5a3f26"/>
  <text x="444" y="522" font-family="'JetBrains Mono',monospace" font-size="13" fill="#ec8b4f" text-anchor="middle">every 5 min</text>
  <line x1="530" y1="450" x2="557" y2="450" stroke="#56c7e8" stroke-width="2" marker-end="url(#ah)"/>

  <!-- Lambda -->
  <rect x="560" y="255" width="206" height="400" rx="14" fill="#121925" stroke="#ec8b4f" stroke-width="1.6"/>
  <text x="580" y="300" font-family="'Space Grotesk',Verdana,sans-serif" font-size="28" font-weight="600" fill="#ec8b4f">&#955;</text>
  <text x="614" y="288" font-size="12" fill="#9aa7b9">AWS Lambda</text>
  <text x="614" y="308" font-family="'Space Grotesk',Verdana,sans-serif" font-size="17" font-weight="600" fill="#e8eef6">Engine Lambda</text>
  <g font-family="'Space Grotesk',Verdana,sans-serif">
    <rect x="576" y="335" width="174" height="48" rx="9" fill="#0e1521" stroke="#1b2533"/><circle cx="594" cy="359" r="5" fill="#56c7e8"/><text x="608" y="364" font-size="14" font-weight="600" fill="#e8eef6">Normalize</text>
    <rect x="576" y="393" width="174" height="48" rx="9" fill="#0e1521" stroke="#1b2533"/><circle cx="594" cy="417" r="5" fill="#5aa9f0"/><text x="608" y="422" font-size="14" font-weight="600" fill="#e8eef6">US relevance</text>
    <rect x="576" y="451" width="174" height="48" rx="9" fill="#0e1521" stroke="#1b2533"/><circle cx="594" cy="475" r="5" fill="#2fbf8c"/><text x="608" y="480" font-size="14" font-weight="600" fill="#e8eef6">Availability rule</text>
    <rect x="576" y="509" width="174" height="48" rx="9" fill="#0e1521" stroke="#1b2533"/><circle cx="594" cy="533" r="5" fill="#8593a6"/><text x="608" y="538" font-size="13" font-weight="600" fill="#e8eef6">ETag conditional GET</text>
  </g>
  <text x="576" y="592" font-size="11" fill="#647184">9 feeds &#183; 4 formats</text>
  <text x="576" y="610" font-size="11" fill="#647184">&#8594; one normalized schema</text>
  <line x1="766" y1="360" x2="788" y2="360" stroke="#2fbf8c" stroke-width="2" marker-end="url(#ah)"/>

  <!-- S3 -->
  <rect x="790" y="240" width="298" height="330" rx="14" fill="#121925" stroke="#2fbf8c" stroke-width="1.5"/>
  <ellipse cx="816" cy="276" rx="13" ry="5" fill="none" stroke="#2fbf8c" stroke-width="2"/>
  <path d="M803 276 V290 a13 5 0 0 0 26 0 V276" fill="none" stroke="#2fbf8c" stroke-width="2"/>
  <text x="840" y="274" font-family="'Space Grotesk',Verdana,sans-serif" font-size="17" font-weight="600" fill="#2fbf8c">Amazon S3</text>
  <text x="840" y="292" font-size="12" fill="#9aa7b9">Data + App bucket</text>
  <g font-family="'JetBrains Mono',monospace">
    <rect x="806" y="308" width="266" height="38" rx="8" fill="#0e1521" stroke="#1b2533"/><text x="820" y="332" font-size="13" fill="#56c7e8">status/current.json</text>
    <rect x="806" y="352" width="266" height="38" rx="8" fill="#0e1521" stroke="#1b2533"/><text x="820" y="376" font-size="13" fill="#56c7e8">status/summary.json</text>
    <rect x="806" y="396" width="266" height="38" rx="8" fill="#0e1521" stroke="#1b2533"/><text x="820" y="420" font-size="13" fill="#56c7e8">history/recent.json</text>
    <rect x="806" y="440" width="266" height="38" rx="8" fill="#0e1521" stroke="#1b2533"/><text x="820" y="464" font-size="13" fill="#56c7e8">history/rollups.json</text>
    <rect x="806" y="490" width="266" height="58" rx="8" fill="#12281f" stroke="#1e4636"/><text x="820" y="514" font-size="13" fill="#2fbf8c">app/</text><text x="820" y="534" font-size="11" fill="#5fae8e" font-family="'Hanken Grotesk',Verdana,sans-serif">SPA web bundle (origin_path=/app)</text>
  </g>

  <!-- CloudWatch -->
  <rect x="360" y="700" width="232" height="140" rx="14" fill="#121925" stroke="#ef716a" stroke-width="1.4"/>
  <circle cx="392" cy="744" r="11" fill="none" stroke="#ef716a" stroke-width="2"/>
  <line x1="400" y1="752" x2="408" y2="760" stroke="#ef716a" stroke-width="2" stroke-linecap="round"/>
  <text x="420" y="742" font-family="'Space Grotesk',Verdana,sans-serif" font-size="15" font-weight="600" fill="#e8eef6">Amazon CloudWatch</text>
  <text x="420" y="762" font-size="12" fill="#9aa7b9">Metrics &#183; Logs</text>
  <text x="378" y="808" font-size="11" fill="#647184">2 alarms watch freshness &amp; errors</text>

  <!-- SNS -->
  <rect x="630" y="700" width="252" height="140" rx="14" fill="#121925" stroke="#ef716a" stroke-width="1.4"/>
  <path d="M662 744 a8 8 0 0 1 16 0 c0 8 4 10 4 14 h-24 c0 -4 4 -6 4 -14 z" fill="none" stroke="#ef716a" stroke-width="1.6"/>
  <line x1="668" y1="764" x2="674" y2="764" stroke="#ef716a" stroke-width="1.6"/>
  <text x="696" y="742" font-family="'Space Grotesk',Verdana,sans-serif" font-size="15" font-weight="600" fill="#e8eef6">Amazon SNS</text>
  <text x="696" y="762" font-size="12" fill="#9aa7b9">Email alerts</text>
  <rect x="664" y="792" width="184" height="30" rx="15" fill="#2a1715" stroke="#4a2624"/>
  <text x="756" y="811" font-size="12" fill="#ef716a" text-anchor="middle">transitions only &#183; debounced</text>

  <!-- Lambda -> alerts -->
  <path d="M640 655 L640 678 L476 678 L476 698" fill="none" stroke="#ef716a" stroke-width="2" marker-end="url(#ah)"/>
  <path d="M690 655 L690 684 L756 684 L756 698" fill="none" stroke="#ef716a" stroke-width="2" marker-end="url(#ah)"/>

  <!-- S3 -> CloudFront -->
  <line x1="1088" y1="430" x2="1126" y2="430" stroke="#56c7e8" stroke-width="2" marker-end="url(#ah)"/>

  <!-- ===== CLOUDFRONT ===== -->
  <rect x="1128" y="305" width="178" height="270" rx="14" fill="#121925" stroke="#56c7e8" stroke-width="1.4" filter="url(#sh)"/>
  <circle cx="1217" cy="356" r="20" fill="none" stroke="#56c7e8" stroke-width="1.8"/>
  <ellipse cx="1217" cy="356" rx="8" ry="20" fill="none" stroke="#56c7e8" stroke-width="1.5"/>
  <line x1="1197" y1="356" x2="1237" y2="356" stroke="#56c7e8" stroke-width="1.5"/>
  <text x="1217" y="402" font-family="'Space Grotesk',Verdana,sans-serif" font-size="15" font-weight="600" fill="#e8eef6" text-anchor="middle">Amazon</text>
  <text x="1217" y="421" font-family="'Space Grotesk',Verdana,sans-serif" font-size="15" font-weight="600" fill="#e8eef6" text-anchor="middle">CloudFront</text>
  <rect x="1144" y="440" width="146" height="48" rx="9" fill="#0e1521" stroke="#1b2533"/><text x="1217" y="460" font-size="12" fill="#9aa7b9" text-anchor="middle">Origin Access</text><text x="1217" y="476" font-size="12" fill="#9aa7b9" text-anchor="middle">Control (OAC)</text>
  <rect x="1144" y="498" width="146" height="48" rx="9" fill="#0e1521" stroke="#1b2533"/><text x="1217" y="518" font-size="12" fill="#9aa7b9" text-anchor="middle">Certificate</text><text x="1217" y="534" font-size="12" fill="#9aa7b9" text-anchor="middle">Manager (ACM)</text>
  <line x1="1306" y1="430" x2="1334" y2="430" stroke="#56c7e8" stroke-width="2" marker-end="url(#ah)"/>

  <!-- ===== ROUTE 53 ===== -->
  <rect x="1336" y="335" width="150" height="210" rx="14" fill="#121925" stroke="#56c7e8" stroke-width="1.4" filter="url(#sh)"/>
  <path d="M1411 360 l22 8 v16 c0 16 -12 24 -22 28 c-10 -4 -22 -12 -22 -28 v-16 z" fill="#16323b" stroke="#56c7e8" stroke-width="1.6"/>
  <text x="1411" y="402" font-family="'Space Grotesk',Verdana,sans-serif" font-size="16" font-weight="600" fill="#56c7e8" text-anchor="middle">53</text>
  <text x="1411" y="448" font-family="'Space Grotesk',Verdana,sans-serif" font-size="14" font-weight="600" fill="#e8eef6" text-anchor="middle">Amazon Route 53</text>
  <text x="1411" y="470" font-size="12" fill="#9aa7b9" text-anchor="middle">Custom domain</text>
  <text x="1411" y="510" font-family="'JetBrains Mono',monospace" font-size="12" fill="#56c7e8" text-anchor="middle">barometer.vinny.dev</text>
  <line x1="1486" y1="430" x2="1514" y2="430" stroke="#56c7e8" stroke-width="2" marker-end="url(#ah)"/>

  <!-- ===== USERS ===== -->
  <rect x="1516" y="300" width="150" height="300" rx="14" fill="#121925" stroke="#243042" stroke-width="1.2" filter="url(#sh)"/>
  <text x="1591" y="336" font-size="13" font-weight="600" fill="#56c7e8" letter-spacing="2" text-anchor="middle">USERS</text>
  <rect x="1546" y="360" width="90" height="60" rx="6" fill="#0e1521" stroke="#56c7e8" stroke-width="1.4"/>
  <rect x="1554" y="368" width="74" height="44" rx="3" fill="#16323b"/>
  <line x1="1561" y1="380" x2="1610" y2="380" stroke="#2fbf8c" stroke-width="2.4"/>
  <line x1="1561" y1="392" x2="1600" y2="392" stroke="#e6bd4d" stroke-width="2.4"/>
  <line x1="1561" y1="404" x2="1606" y2="404" stroke="#56c7e8" stroke-width="2.4"/>
  <path d="M1536 430 h110 l8 14 h-126 z" fill="#16323b" stroke="#56c7e8" stroke-width="1.2"/>
  <text x="1591" y="486" font-family="'Space Grotesk',Verdana,sans-serif" font-size="14" font-weight="600" fill="#e8eef6" text-anchor="middle">Vanilla TS</text>
  <text x="1591" y="506" font-family="'Space Grotesk',Verdana,sans-serif" font-size="14" font-weight="600" fill="#e8eef6" text-anchor="middle">dashboard</text>
  <rect x="1531" y="528" width="120" height="32" rx="16" fill="#16323b" stroke="#2f5763"/>
  <text x="1591" y="549" font-family="'JetBrains Mono',monospace" font-size="12" fill="#56c7e8" text-anchor="middle">polls every 60s</text>

  <!-- ===== LEGEND ===== -->
  <line x1="360" y1="885" x2="402" y2="885" stroke="#56c7e8" stroke-width="3" stroke-linecap="round"/><text x="412" y="890" font-size="13" fill="#9aa7b9">data flow</text>
  <line x1="540" y1="885" x2="582" y2="885" stroke="#ec8b4f" stroke-width="3" stroke-linecap="round"/><text x="592" y="890" font-size="13" fill="#9aa7b9">AWS compute</text>
  <line x1="740" y1="885" x2="782" y2="885" stroke="#2fbf8c" stroke-width="3" stroke-linecap="round"/><text x="792" y="890" font-size="13" fill="#9aa7b9">storage</text>
  <line x1="900" y1="885" x2="942" y2="885" stroke="#ef716a" stroke-width="3" stroke-linecap="round"/><text x="952" y="890" font-size="13" fill="#9aa7b9">alerts / notifications</text>
</svg>
