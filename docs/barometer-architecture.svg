<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">Barometer app architecture</title>
  <desc id="desc">A polished system architecture diagram for Barometer, showing provider feeds, EventBridge, the single-writer Lambda engine, private S3 JSON storage, CloudFront, browser polling, and monitoring.</desc>

  <defs>
    <radialGradient id="page-glow" cx="50%" cy="-16%" r="84%">
      <stop offset="0%" stop-color="#0d7a99" stop-opacity="0.14"/>
      <stop offset="58%" stop-color="#0d7a99" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="pressure-scale" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#bf3d37"/>
      <stop offset="34%" stop-color="#b4551f"/>
      <stop offset="62%" stop-color="#9a6c12"/>
      <stop offset="100%" stop-color="#15885c"/>
    </linearGradient>

    <linearGradient id="lambda-glow" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0d7a99" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#c2632c" stop-opacity="0.08"/>
    </linearGradient>

    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#142846" flood-opacity="0.12"/>
      <feDropShadow dx="0" dy="1" stdDeviation="1" flood-color="#101821" flood-opacity="0.07"/>
    </filter>

    <filter id="small-shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#142846" flood-opacity="0.08"/>
      <feDropShadow dx="0" dy="1" stdDeviation="1" flood-color="#101821" flood-opacity="0.06"/>
    </filter>

    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2 L10 6 L2 10 Z" fill="#0d7a99"/>
    </marker>

    <marker id="arrow-muted" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2 L10 6 L2 10 Z" fill="#8a94a6"/>
    </marker>

    <symbol id="dial" viewBox="0 0 24 24">
      <circle cx="12" cy="12" r="8.4" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M12 3.2V4.6" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" opacity="0.5"/>
      <path d="M20.5 12H19.1" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" opacity="0.5"/>
      <path d="M3.5 12H4.9" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" opacity="0.5"/>
      <path d="M12 12L16.8 7.6" fill="none" stroke="#c2632c" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="12" cy="12" r="1.55" fill="currentColor"/>
    </symbol>

    <symbol id="calendar" viewBox="0 0 24 24">
      <rect x="4" y="5" width="16" height="15" rx="2.5" fill="none" stroke="currentColor" stroke-width="1.8"/>
      <path d="M8 3v4M16 3v4M4 10h16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
      <path d="M8 14h2M13 14h3M8 17h5" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" opacity="0.7"/>
    </symbol>

    <symbol id="bucket" viewBox="0 0 24 24">
      <path d="M5 7.5C5 5.6 8.1 4 12 4s7 1.6 7 3.5v9C19 18.4 15.9 20 12 20s-7-1.6-7-3.5v-9Z" fill="none" stroke="currentColor" stroke-width="1.8"/>
      <path d="M5 7.5C5 9.4 8.1 11 12 11s7-1.6 7-3.5M5 12c0 1.9 3.1 3.5 7 3.5s7-1.6 7-3.5" fill="none" stroke="currentColor" stroke-width="1.8" opacity="0.65"/>
    </symbol>

    <symbol id="edge" viewBox="0 0 24 24">
      <path d="M4 12a8 8 0 0 1 15.7-2M20 12a8 8 0 0 1-15.7 2" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
      <path d="M18.5 5.5 20 10l-4.5-1.5M5.5 18.5 4 14l4.5 1.5" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="12" cy="12" r="3" fill="none" stroke="currentColor" stroke-width="1.8" opacity="0.7"/>
    </symbol>

    <symbol id="browser" viewBox="0 0 24 24">
      <rect x="3.5" y="5" width="17" height="14" rx="2.5" fill="none" stroke="currentColor" stroke-width="1.8"/>
      <path d="M3.5 9.5h17M7 7.2h.01M10 7.2h.01" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
      <path d="M8 14h8M8 16.8h5" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" opacity="0.7"/>
    </symbol>

    <symbol id="alarm" viewBox="0 0 24 24">
      <path d="M12 6v7l4 2" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
      <circle cx="12" cy="13" r="7" fill="none" stroke="currentColor" stroke-width="1.8"/>
      <path d="M5 4 3.3 5.7M19 4l1.7 1.7" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
    </symbol>

    <style>
      .bg { fill: #f3f5f8; }
      .surface { fill: #ffffff; stroke: #e6eaf0; }
      .surface-2 { fill: #f6f8fb; stroke: #e6eaf0; }
      .ink { fill: #18212e; }
      .muted { fill: #586478; }
      .faint { fill: #8a94a6; }
      .brand { fill: #0d7a99; }
      .accent { fill: #c2632c; }
      .brand-stroke { stroke: #0d7a99; }
      .muted-stroke { stroke: #8a94a6; }
      .display { font-family: "Space Grotesk", "Avenir Next", ui-sans-serif, system-ui, sans-serif; font-weight: 600; }
      .sans { font-family: "Hanken Grotesk", "Avenir Next", ui-sans-serif, system-ui, sans-serif; }
      .mono { font-family: "JetBrains Mono", "SF Mono", ui-monospace, Menlo, Consolas, monospace; font-weight: 500; }
      .h1 { font-size: 44px; }
      .h2 { font-size: 24px; }
      .h3 { font-size: 18px; }
      .body { font-size: 16px; }
      .small { font-size: 13px; }
      .tiny { font-size: 11px; }
      .label { font-size: 11px; font-weight: 700; text-transform: uppercase; }
      .arrow { fill: none; stroke: #0d7a99; stroke-width: 2.8; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow); }
      .arrow-muted { fill: none; stroke: #8a94a6; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow-muted); stroke-dasharray: 8 8; }
      .hairline { stroke: #eef1f6; stroke-width: 1; }
      .pill-text { font-size: 13px; font-weight: 600; }
      .status-text { font-size: 12px; font-weight: 700; }
    </style>
  </defs>

  <rect width="1600" height="1000" class="bg"/>
  <rect width="1600" height="1000" fill="url(#page-glow)"/>
  <path d="M0 808 C220 760 326 870 550 824 C780 776 846 710 1116 766 C1328 826 1438 770 1600 710 L1600 1000 L0 1000 Z" fill="#ffffff" opacity="0.36"/>

  <g transform="translate(68 58)">
    <rect x="0" y="0" width="54" height="54" rx="17" fill="#ffffff" stroke="#e6eaf0" filter="url(#small-shadow)"/>
    <g transform="translate(11 11)" color="#0d7a99">
      <use href="#dial" width="32" height="32"/>
    </g>
    <text x="72" y="24" class="display h1 ink">Barometer architecture</text>
    <text x="74" y="52" class="sans body muted">Scheduled internet-health monitor with a single-writer engine and static read path</text>
  </g>

  <g transform="translate(1252 58)">
    <rect x="0" y="0" width="280" height="54" rx="27" class="surface-2"/>
    <circle cx="30" cy="27" r="6" fill="#15885c"/>
    <circle cx="30" cy="27" r="12" fill="none" stroke="#15885c" stroke-opacity="0.18" stroke-width="5"/>
    <text x="50" y="23" class="sans small muted">Live system</text>
    <text x="50" y="42" class="mono tiny ink">barometer.vinny.dev</text>
    <text x="204" y="34" class="mono small faint">5 min</text>
  </g>

  <!-- Provider feeds -->
  <g transform="translate(68 166)">
    <rect width="372" height="535" rx="18" class="surface" filter="url(#soft-shadow)"/>
    <text x="28" y="42" class="display h2 ink">Public provider feeds</text>
    <text x="28" y="68" class="sans small muted">9 upstreams, read concurrently with timeout, retry, and ETag reuse</text>

    <text x="28" y="112" class="sans label faint">Statuspage adapter</text>
    <g transform="translate(28 130)">
      <rect x="0" y="0" width="143" height="34" rx="17" fill="#eaf6f2"/>
      <text x="18" y="22" class="sans pill-text" fill="#15885c">Cloudflare</text>
      <rect x="155" y="0" width="102" height="34" rx="17" fill="#eaf6f2"/>
      <text x="173" y="22" class="sans pill-text" fill="#15885c">GitHub</text>
      <rect x="0" y="46" width="101" height="34" rx="17" fill="#eaf6f2"/>
      <text x="18" y="68" class="sans pill-text" fill="#15885c">OpenAI</text>
      <rect x="113" y="46" width="129" height="34" rx="17" fill="#eaf6f2"/>
      <text x="131" y="68" class="sans pill-text" fill="#15885c">Anthropic</text>
      <rect x="0" y="92" width="90" height="34" rx="17" fill="#eaf6f2"/>
      <text x="18" y="114" class="sans pill-text" fill="#15885c">Vercel</text>
      <rect x="102" y="92" width="136" height="34" rx="17" fill="#eaf6f2"/>
      <text x="120" y="114" class="sans pill-text" fill="#15885c">DigitalOcean</text>
    </g>

    <line x1="28" y1="290" x2="344" y2="290" class="hairline"/>
    <text x="28" y="326" class="sans label faint">Bespoke adapters</text>
    <g transform="translate(28 346)">
      <rect x="0" y="0" width="316" height="42" rx="14" fill="#f6f8fb" stroke="#e6eaf0"/>
      <text x="18" y="26" class="mono small ink">AWS Health</text>
      <text x="130" y="26" class="sans small muted">UTF-16BE JSON</text>
      <rect x="0" y="54" width="316" height="42" rx="14" fill="#f6f8fb" stroke="#e6eaf0"/>
      <text x="18" y="80" class="mono small ink">Azure</text>
      <text x="130" y="80" class="sans small muted">RSS feed</text>
      <rect x="0" y="108" width="316" height="42" rx="14" fill="#f6f8fb" stroke="#e6eaf0"/>
      <text x="18" y="134" class="mono small ink">GCP</text>
      <text x="130" y="134" class="sans small muted">incidents.json</text>
    </g>

    <text x="28" y="522" class="sans small muted">Adapter contract: never fail the run</text>
  </g>

  <!-- Scheduler -->
  <g transform="translate(520 166)">
    <rect width="366" height="112" rx="18" class="surface" filter="url(#small-shadow)"/>
    <g transform="translate(28 27)" color="#0d7a99">
      <use href="#calendar" width="58" height="58"/>
    </g>
    <text x="104" y="44" class="display h3 ink">EventBridge Scheduler</text>
    <text x="104" y="70" class="sans small muted">Invokes the engine every 5 minutes</text>
    <text x="104" y="91" class="mono tiny faint">rate(5 minutes)</text>
  </g>

  <!-- Lambda engine -->
  <g transform="translate(500 334)">
    <rect width="420" height="360" rx="22" class="surface" filter="url(#soft-shadow)"/>
    <rect width="420" height="360" rx="22" fill="url(#lambda-glow)" opacity="0.9"/>
    <g transform="translate(30 28)" color="#0d7a99">
      <use href="#dial" width="54" height="54"/>
    </g>
    <text x="104" y="53" class="display h2 ink">barometer-engine Lambda</text>
    <text x="104" y="80" class="sans small muted">Node 24, esbuild bundle, one writer to JSON state</text>

    <g transform="translate(30 116)">
      <rect x="0" y="0" width="166" height="54" rx="14" fill="#ffffff" stroke="#e6eaf0"/>
      <text x="18" y="23" class="sans status-text" fill="#0d7a99">HTTP client</text>
      <text x="18" y="41" class="mono tiny faint">timeout retry etag</text>
      <rect x="194" y="0" width="166" height="54" rx="14" fill="#ffffff" stroke="#e6eaf0"/>
      <text x="212" y="23" class="sans status-text" fill="#0d7a99">Adapters</text>
      <text x="212" y="41" class="mono tiny faint">statuspage aws azure gcp</text>

      <rect x="0" y="70" width="166" height="54" rx="14" fill="#ffffff" stroke="#e6eaf0"/>
      <text x="18" y="93" class="sans status-text" fill="#0d7a99">Normalize</text>
      <text x="18" y="111" class="mono tiny faint">common schema</text>
      <rect x="194" y="70" width="166" height="54" rx="14" fill="#ffffff" stroke="#e6eaf0"/>
      <text x="212" y="93" class="sans status-text" fill="#0d7a99">Availability</text>
      <text x="212" y="111" class="mono tiny faint">US relevance rule</text>

      <rect x="0" y="140" width="166" height="54" rx="14" fill="#ffffff" stroke="#e6eaf0"/>
      <text x="18" y="163" class="sans status-text" fill="#0d7a99">History</text>
      <text x="18" y="181" class="mono tiny faint">recent + rollups</text>
      <rect x="194" y="140" width="166" height="54" rx="14" fill="#ffffff" stroke="#e6eaf0"/>
      <text x="212" y="163" class="sans status-text" fill="#0d7a99">Alerts</text>
      <text x="212" y="181" class="mono tiny faint">2-sample transition</text>
    </g>

    <line x1="30" y1="328" x2="390" y2="328" class="hairline"/>
    <text x="30" y="345" class="sans small muted">Single-writer invariant: no DB, no locks, no concurrent S3 writers</text>
  </g>

  <!-- Data layer -->
  <g transform="translate(1010 166)">
    <rect width="522" height="330" rx="18" class="surface" filter="url(#soft-shadow)"/>
    <g transform="translate(28 28)" color="#0d7a99">
      <use href="#bucket" width="54" height="54"/>
    </g>
    <text x="98" y="50" class="display h2 ink">Private S3 bucket</text>
    <text x="98" y="76" class="sans small muted">CloudFront Origin Access Control is the only public read path</text>

    <g transform="translate(28 98)">
      <rect x="0" y="0" width="466" height="34" rx="12" fill="#f6f8fb" stroke="#e6eaf0"/>
      <text x="18" y="22" class="mono tiny ink">/status/current.json</text>
      <text x="224" y="22" class="sans small muted">latest provider snapshot</text>
      <rect x="0" y="44" width="466" height="34" rx="12" fill="#f6f8fb" stroke="#e6eaf0"/>
      <text x="18" y="66" class="mono tiny ink">/status/summary.json</text>
      <text x="224" y="66" class="sans small muted">headline + uptime windows</text>
      <rect x="0" y="88" width="466" height="34" rx="12" fill="#f6f8fb" stroke="#e6eaf0"/>
      <text x="18" y="110" class="mono tiny ink">/history/recent.json</text>
      <text x="224" y="110" class="sans small muted">48h at five-minute samples</text>
      <rect x="0" y="132" width="466" height="34" rx="12" fill="#f6f8fb" stroke="#e6eaf0"/>
      <text x="18" y="154" class="mono tiny ink">/history/rollups.json</text>
      <text x="224" y="154" class="sans small muted">90 daily uptime buckets</text>
      <rect x="0" y="176" width="466" height="34" rx="12" fill="#fff7f2" stroke="#f0d8c9"/>
      <text x="18" y="198" class="mono tiny ink">/status/state.json</text>
      <text x="224" y="198" class="sans small muted">internal alert + ETag state</text>
    </g>
  </g>

  <!-- Delivery path -->
  <g transform="translate(1010 520)">
    <rect width="244" height="138" rx="18" class="surface" filter="url(#small-shadow)"/>
    <g transform="translate(24 25)" color="#0d7a99">
      <use href="#edge" width="44" height="44"/>
    </g>
    <text x="82" y="45" class="display h3 ink">CloudFront</text>
    <text x="82" y="69" class="sans small muted">HTTPS + OAC</text>
    <text x="24" y="108" class="mono tiny faint">/app, /status/*, /history/*</text>
  </g>

  <g transform="translate(1288 520)">
    <rect width="244" height="138" rx="18" class="surface" filter="url(#small-shadow)"/>
    <g transform="translate(24 25)" color="#0d7a99">
      <use href="#browser" width="44" height="44"/>
    </g>
    <text x="82" y="45" class="display h3 ink">Browser UI</text>
    <text x="82" y="69" class="sans small muted">Vanilla TS dashboard</text>
    <text x="24" y="108" class="mono tiny faint">polls summary every 60s</text>
  </g>

  <g transform="translate(1010 714)">
    <rect width="522" height="114" rx="18" class="surface" filter="url(#small-shadow)"/>
    <g transform="translate(28 28)" color="#c2632c">
      <use href="#alarm" width="48" height="48"/>
    </g>
    <text x="94" y="47" class="display h3 ink">Watch the watcher</text>
    <text x="94" y="72" class="sans small muted">CloudWatch metrics, Lambda error alarm, missing RunSuccess alarm.</text>
    <text x="94" y="94" class="mono tiny faint">SNS email; alerts fire on transitions only.</text>
  </g>

  <!-- Connections -->
  <path d="M440 408 C472 408 466 514 500 514" class="arrow"/>
  <text x="445" y="386" class="sans tiny faint">fetch + normalize</text>

  <path d="M703 278 L703 334" class="arrow"/>
  <text x="718" y="314" class="sans tiny faint">invoke</text>

  <path d="M920 500 C958 500 966 307 1010 307" class="arrow"/>
  <text x="932" y="392" class="sans tiny faint">write JSON</text>

  <path d="M1236 496 C1208 514 1186 520 1168 520" class="arrow-muted"/>
  <text x="1160" y="507" class="sans tiny faint">origin read</text>

  <path d="M1254 589 L1288 589" class="arrow"/>
  <text x="1254" y="571" class="sans tiny faint">serve</text>

  <path d="M824 694 C892 760 952 764 1010 763" class="arrow-muted"/>
  <text x="865" y="744" class="sans tiny faint">metrics + alarms</text>

  <!-- Availability rule band -->
  <g transform="translate(68 856)">
    <rect width="1464" height="104" rx="18" class="surface" filter="url(#small-shadow)"/>
    <text x="28" y="38" class="display h3 ink">Availability rule</text>
    <text x="28" y="68" class="sans small muted">Operational counts up. Degraded, partial outage, and major outage count down.</text>
    <text x="28" y="90" class="mono tiny faint">Maintenance and unknown are excluded; non-US incidents stay visible but uncounted.</text>

    <g transform="translate(760 28)">
      <rect x="0" y="0" width="70" height="28" rx="14" fill="#f6e5e4"/>
      <text x="16" y="19" class="sans status-text" fill="#bf3d37">Stormy</text>
      <rect x="86" y="0" width="92" height="28" rx="14" fill="#f9eee6"/>
      <text x="104" y="19" class="sans status-text" fill="#b4551f">Unsettled</text>
      <rect x="194" y="0" width="106" height="28" rx="14" fill="#f5eddd"/>
      <text x="211" y="19" class="sans status-text" fill="#9a6c12">Changeable</text>
      <rect x="316" y="0" width="55" height="28" rx="14" fill="#eaf6f2"/>
      <text x="334" y="19" class="sans status-text" fill="#15885c">Fair</text>
      <rect x="0" y="52" width="386" height="10" rx="5" fill="url(#pressure-scale)"/>
      <rect x="238" y="45" width="4" height="24" rx="2" fill="#18212e"/>
      <text x="0" y="86" class="mono tiny faint">down</text>
      <text x="352" y="86" class="mono tiny faint">up</text>
    </g>
  </g>
</svg>
