<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1680 760" font-family="'Hanken Grotesk',Verdana,ui-sans-serif,sans-serif">
  <defs>
    <radialGradient id="glow" cx="50%" cy="0%" r="80%">
      <stop offset="0" stop-color="#56c7e8" stop-opacity="0.13"/>
      <stop offset="0.6" stop-color="#56c7e8" stop-opacity="0"/>
    </radialGradient>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="160%"><feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000000" flood-opacity="0.55"/></filter>
    <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1680" height="760" fill="#0a0e15"/>
  <rect x="0" y="0" width="1680" height="500" fill="url(#glow)"/>

  <!-- ===== HEADER ===== -->
  <g transform="translate(34,28) scale(3.4)" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="8.4" stroke="#56c7e8" stroke-width="1.7"/>
    <path d="M12 3.2V4.6" stroke="#56c7e8" stroke-width="1.4" opacity=".5"/>
    <path d="M20.5 12H19.1" stroke="#56c7e8" stroke-width="1.4" opacity=".5"/>
    <path d="M3.5 12H4.9" stroke="#56c7e8" stroke-width="1.4" opacity=".5"/>
    <path d="M12 12L16.8 7.6" stroke="#ec8b4f" stroke-width="1.9"/>
    <circle cx="12" cy="12" r="1.55" fill="#56c7e8"/>
  </g>
  <text x="134" y="80" font-family="'Space Grotesk',Verdana,sans-serif" font-size="44" font-weight="600" fill="#e8eef6" letter-spacing="-0.5">Barometer</text>
  <text x="136" y="108" font-size="14" font-weight="600" fill="#56c7e8" letter-spacing="3">ENGINE INTERNALS &#183; ANATOMY OF ONE 5-MINUTE RUN</text>
  <line x1="980" y1="38" x2="980" y2="112" stroke="#243042" stroke-width="1.5"/>
  <text x="1006" y="68" font-size="20" fill="#9aa7b9">Nine public status feeds in &#8212;</text>
  <text x="1006" y="98" font-size="20" fill="#56c7e8">one health reading out.</text>

  <!-- ===== TRIGGER ===== -->
  <rect x="30" y="250" width="175" height="150" rx="14" fill="#121925" stroke="#243042" stroke-width="1.2" filter="url(#sh)"/>
  <circle cx="70" cy="300" r="17" fill="none" stroke="#56c7e8" stroke-width="2"/>
  <line x1="70" y1="300" x2="70" y2="290" stroke="#56c7e8" stroke-width="2" stroke-linecap="round"/>
  <line x1="70" y1="300" x2="78" y2="304" stroke="#56c7e8" stroke-width="2" stroke-linecap="round"/>
  <text x="100" y="296" font-size="13" fill="#9aa7b9">Amazon</text>
  <text x="100" y="314" font-family="'Space Grotesk',Verdana,sans-serif" font-size="17" font-weight="600" fill="#e8eef6">EventBridge</text>
  <rect x="46" y="344" width="143" height="34" rx="17" fill="#16323b" stroke="#2f5763" stroke-width="1"/>
  <text x="117" y="366" font-family="'JetBrains Mono',monospace" font-size="13" fill="#56c7e8" text-anchor="middle">rate(5 min)</text>
  <line x1="205" y1="325" x2="225" y2="325" stroke="#56c7e8" stroke-width="2" marker-end="url(#ah)"/>

  <!-- ===== LAMBDA CONTAINER ===== -->
  <rect x="228" y="150" width="712" height="486" rx="18" fill="#121925" stroke="#ec8b4f" stroke-width="1.6" filter="url(#sh)"/>
  <text x="258" y="198" font-family="'Space Grotesk',Verdana,sans-serif" font-size="30" font-weight="600" fill="#ec8b4f">&#955;</text>
  <text x="300" y="180" font-size="13" fill="#9aa7b9">AWS Lambda</text>
  <text x="300" y="202" font-family="'Space Grotesk',Verdana,sans-serif" font-size="20" font-weight="600" fill="#ec8b4f">barometer-engine</text>

  <!-- col A: FETCH -->
  <rect x="248" y="222" width="218" height="410" rx="12" fill="#0e1521" stroke="#1b2533" stroke-width="1"/>
  <text x="262" y="250" font-size="13" font-weight="600" fill="#56c7e8" letter-spacing="1">1 &#183; FETCH &#8212; FAN-OUT</text>
  <rect x="256" y="262" width="200" height="86" rx="9" fill="#121925" stroke="#243042" stroke-width="1"/>
  <text x="270" y="286" font-family="'Space Grotesk',Verdana,sans-serif" font-size="14" font-weight="600" fill="#e8eef6">Statuspage adapter &#215;6</text>
  <text x="270" y="306" font-size="11" fill="#9aa7b9">Cloudflare &#183; GitHub &#183; OpenAI</text>
  <text x="270" y="323" font-size="11" fill="#9aa7b9">Anthropic &#183; Vercel &#183; DigitalOcean</text>
  <text x="270" y="340" font-family="'JetBrains Mono',monospace" font-size="10" fill="#768396">/api/v2/summary.json</text>
  <rect x="256" y="358" width="200" height="56" rx="9" fill="#121925" stroke="#243042" stroke-width="1"/>
  <text x="270" y="382" font-family="'Space Grotesk',Verdana,sans-serif" font-size="14" font-weight="600" fill="#e8eef6">AWS adapter</text>
  <text x="270" y="401" font-size="11" fill="#9aa7b9">Health JSON &#183; UTF-16BE decode</text>
  <rect x="256" y="424" width="200" height="56" rx="9" fill="#121925" stroke="#243042" stroke-width="1"/>
  <text x="270" y="448" font-family="'Space Grotesk',Verdana,sans-serif" font-size="14" font-weight="600" fill="#e8eef6">Azure adapter</text>
  <text x="270" y="467" font-size="11" fill="#9aa7b9">status RSS (XML)</text>
  <rect x="256" y="490" width="200" height="56" rx="9" fill="#121925" stroke="#243042" stroke-width="1"/>
  <text x="270" y="514" font-family="'Space Grotesk',Verdana,sans-serif" font-size="14" font-weight="600" fill="#e8eef6">GCP adapter</text>
  <text x="270" y="533" font-size="11" fill="#9aa7b9">incidents.json</text>
  <text x="262" y="572" font-size="11" fill="#768396">&#8635; conditional GET (ETag)</text>
  <text x="262" y="592" font-size="11" fill="#768396">&#10003; every feed zod-validated</text>
  <text x="262" y="612" font-size="11" fill="#768396">adapters never throw &#8594; unknown</text>

  <line x1="466" y1="430" x2="478" y2="430" stroke="#56c7e8" stroke-width="2" marker-end="url(#ah)"/>

  <!-- col B: NORMALIZE -->
  <rect x="480" y="222" width="200" height="410" rx="12" fill="#0e1521" stroke="#1b2533" stroke-width="1"/>
  <text x="492" y="250" font-size="13" font-weight="600" fill="#5aa9f0" letter-spacing="1">2 &#183; NORMALIZE</text>
  <rect x="488" y="262" width="184" height="44" rx="9" fill="#121925" stroke="#243042" stroke-width="1"/>
  <text x="500" y="282" font-family="'Space Grotesk',Verdana,sans-serif" font-size="14" font-weight="600" fill="#e8eef6">ProviderSnapshot</text>
  <text x="500" y="299" font-family="'JetBrains Mono',monospace" font-size="10" fill="#9aa7b9">{ status, activeIncidents }</text>
  <text x="492" y="344" font-size="11" fill="#768396" letter-spacing="2">STATUS ENUM</text>
  <g font-size="13">
    <rect x="488" y="356" width="184" height="30" rx="8" fill="#12281f" stroke="#243042" stroke-width="1"/>
    <circle cx="502" cy="371" r="5" fill="#2fbf8c"/><text x="514" y="375" fill="#e8eef6">operational</text><text x="662" y="375" font-size="10" fill="#2fbf8c" text-anchor="end">up</text>
    <rect x="488" y="394" width="184" height="30" rx="8" fill="#2a2410" stroke="#243042" stroke-width="1"/>
    <circle cx="502" cy="409" r="5" fill="#e6bd4d"/><text x="514" y="413" fill="#e8eef6">degraded</text><text x="662" y="413" font-size="10" fill="#ef716a" text-anchor="end">down</text>
    <rect x="488" y="432" width="184" height="30" rx="8" fill="#2a2015" stroke="#243042" stroke-width="1"/>
    <circle cx="502" cy="447" r="5" fill="#ef8a4c"/><text x="514" y="451" fill="#e8eef6">partial_outage</text><text x="662" y="451" font-size="10" fill="#ef716a" text-anchor="end">down</text>
    <rect x="488" y="470" width="184" height="30" rx="8" fill="#2a1715" stroke="#243042" stroke-width="1"/>
    <circle cx="502" cy="485" r="5" fill="#ef716a"/><text x="514" y="489" fill="#e8eef6">major_outage</text><text x="662" y="489" font-size="10" fill="#ef716a" text-anchor="end">down</text>
    <rect x="488" y="508" width="184" height="30" rx="8" fill="#1b2533" stroke="#243042" stroke-width="1"/>
    <circle cx="502" cy="523" r="5" fill="#8593a6"/><text x="514" y="527" fill="#e8eef6">maintenance</text><text x="662" y="527" font-size="10" fill="#8593a6" text-anchor="end">excluded</text>
    <rect x="488" y="546" width="184" height="30" rx="8" fill="#1b2533" stroke="#243042" stroke-width="1"/>
    <circle cx="502" cy="561" r="5" fill="#8593a6"/><text x="514" y="565" fill="#e8eef6">unknown</text><text x="662" y="565" font-size="10" fill="#8593a6" text-anchor="end">excluded</text>
  </g>

  <line x1="680" y1="430" x2="692" y2="430" stroke="#56c7e8" stroke-width="2" marker-end="url(#ah)"/>

  <!-- col C: SCORE -->
  <rect x="694" y="222" width="232" height="410" rx="12" fill="#0e1521" stroke="#1b2533" stroke-width="1"/>
  <text x="706" y="250" font-size="13" font-weight="600" fill="#2fbf8c" letter-spacing="1">3 &#183; SCORE &amp; AGGREGATE</text>
  <rect x="702" y="262" width="216" height="128" rx="9" fill="#121925" stroke="#243042" stroke-width="1"/>
  <text x="714" y="286" font-family="'Space Grotesk',Verdana,sans-serif" font-size="13" font-weight="600" fill="#e8eef6">Availability rule</text>
  <circle cx="718" cy="312" r="5" fill="#2fbf8c"/><text x="730" y="316" font-size="11" fill="#9aa7b9">up = operational</text>
  <circle cx="718" cy="338" r="5" fill="#ef716a"/><text x="730" y="342" font-size="11" fill="#9aa7b9">down = degraded / partial / major</text>
  <circle cx="718" cy="364" r="5" fill="#8593a6"/><text x="730" y="368" font-size="11" fill="#9aa7b9">excluded = maintenance / unknown</text>
  <rect x="702" y="400" width="216" height="150" rx="9" fill="#121925" stroke="#243042" stroke-width="1"/>
  <text x="714" y="424" font-family="'Space Grotesk',Verdana,sans-serif" font-size="13" font-weight="600" fill="#e8eef6">US region scope <tspan font-family="'JetBrains Mono',monospace" font-size="10" font-weight="400" fill="#56c7e8">isUsRelevant</tspan></text>
  <text x="714" y="450" font-size="11" fill="#9aa7b9">no region &#8594; count (fail-open)</text>
  <text x="714" y="473" font-size="11" fill="#9aa7b9">us-* present &#8594; count</text>
  <text x="714" y="496" font-size="11" fill="#9aa7b9">only &#8220;global&#8221; &#8594; count</text>
  <text x="714" y="519" font-size="11" fill="#9aa7b9">global + non-US &#8594; ignore</text>
  <rect x="702" y="562" width="216" height="56" rx="9" fill="#12281f" stroke="#2fbf8c" stroke-width="1.3"/>
  <text x="714" y="586" font-family="'Space Grotesk',Verdana,sans-serif" font-size="14" font-weight="600" fill="#2fbf8c">Overall reading</text>
  <text x="714" y="605" font-size="11" fill="#5fae8e">healthy % &#183; status &#183; label</text>

  <!-- ===== OUTPUT: S3 ===== -->
  <line x1="940" y1="250" x2="1004" y2="250" stroke="#2fbf8c" stroke-width="2" marker-end="url(#ah)"/>
  <text x="972" y="240" font-size="11" fill="#2fbf8c" text-anchor="middle">write</text>
  <rect x="1006" y="168" width="414" height="300" rx="16" fill="#121925" stroke="#2fbf8c" stroke-width="1.4" filter="url(#sh)"/>
  <ellipse cx="1032" cy="196" rx="13" ry="5" fill="none" stroke="#2fbf8c" stroke-width="2"/>
  <path d="M1019 196 V210 a13 5 0 0 0 26 0 V196" fill="none" stroke="#2fbf8c" stroke-width="2"/>
  <text x="1056" y="194" font-family="'Space Grotesk',Verdana,sans-serif" font-size="18" font-weight="600" fill="#2fbf8c">Amazon S3 &#8212; tiered JSON</text>
  <text x="1056" y="212" font-size="11" fill="#9aa7b9">single writer &#183; no locks, no DB</text>
  <g font-family="'JetBrains Mono',monospace">
    <rect x="1022" y="230" width="382" height="40" rx="7" fill="#0e1521" stroke="#1b2533" stroke-width="1"/>
    <text x="1036" y="255" font-size="13" fill="#56c7e8">status/current.json</text><text x="1392" y="255" font-size="11" fill="#9aa7b9" text-anchor="end" font-family="'Hanken Grotesk',Verdana,sans-serif">latest snapshot</text>
    <rect x="1022" y="278" width="382" height="40" rx="7" fill="#0e1521" stroke="#1b2533" stroke-width="1"/>
    <text x="1036" y="303" font-size="13" fill="#56c7e8">status/summary.json</text><text x="1392" y="303" font-size="11" fill="#9aa7b9" text-anchor="end" font-family="'Hanken Grotesk',Verdana,sans-serif">snapshots + uptime windows</text>
    <rect x="1022" y="326" width="382" height="40" rx="7" fill="#0e1521" stroke="#1b2533" stroke-width="1"/>
    <text x="1036" y="351" font-size="13" fill="#56c7e8">status/state.json</text><text x="1392" y="351" font-size="11" fill="#9aa7b9" text-anchor="end" font-family="'Hanken Grotesk',Verdana,sans-serif">alert-machine state</text>
    <rect x="1022" y="374" width="382" height="40" rx="7" fill="#0e1521" stroke="#1b2533" stroke-width="1"/>
    <text x="1036" y="399" font-size="13" fill="#56c7e8">history/recent.json</text><text x="1392" y="399" font-size="11" fill="#9aa7b9" text-anchor="end" font-family="'Hanken Grotesk',Verdana,sans-serif">48h @ 5-min samples</text>
    <rect x="1022" y="422" width="382" height="40" rx="7" fill="#0e1521" stroke="#1b2533" stroke-width="1"/>
    <text x="1036" y="447" font-size="13" fill="#56c7e8">history/rollups.json</text><text x="1392" y="447" font-size="11" fill="#9aa7b9" text-anchor="end" font-family="'Hanken Grotesk',Verdana,sans-serif">daily up/down &#183; 90-day cap</text>
  </g>

  <!-- ===== OUTPUT: ALERT MACHINE ===== -->
  <line x1="940" y1="560" x2="1004" y2="560" stroke="#ef716a" stroke-width="2" marker-end="url(#ah)"/>
  <rect x="1006" y="504" width="272" height="132" rx="14" fill="#121925" stroke="#ef716a" stroke-width="1.4" filter="url(#sh)"/>
  <text x="1022" y="532" font-family="'Space Grotesk',Verdana,sans-serif" font-size="15" font-weight="600" fill="#ef716a">4 &#183; Alert state machine</text>
  <text x="1022" y="556" font-size="11" fill="#9aa7b9">transitions only &#8212; fires on change</text>
  <text x="1022" y="576" font-size="11" fill="#9aa7b9">2-sample debounce (up/down class)</text>
  <text x="1022" y="596" font-size="11" fill="#9aa7b9">symmetric recovery</text>
  <text x="1022" y="616" font-size="11" fill="#9aa7b9">maintenance / unknown = hold</text>

  <!-- ===== OUTPUT: SNS ===== -->
  <line x1="1278" y1="570" x2="1304" y2="570" stroke="#ef716a" stroke-width="2" marker-end="url(#ah)"/>
  <rect x="1306" y="514" width="210" height="116" rx="14" fill="#121925" stroke="#ef716a" stroke-width="1.4" filter="url(#sh)"/>
  <path d="M1326 556 a8 8 0 0 1 16 0 c0 8 4 10 4 14 h-24 c0 -4 4 -6 4 -14 z" fill="none" stroke="#ef716a" stroke-width="1.6"/>
  <line x1="1332" y1="576" x2="1338" y2="576" stroke="#ef716a" stroke-width="1.6"/>
  <text x="1356" y="548" font-family="'Space Grotesk',Verdana,sans-serif" font-size="16" font-weight="600" fill="#ef716a">Amazon SNS</text>
  <text x="1356" y="568" font-size="11" fill="#9aa7b9">email alerts</text>
  <rect x="1320" y="592" width="80" height="26" rx="13" fill="#2a1715" stroke="#4a2624" stroke-width="1"/><text x="1360" y="609" font-size="11" fill="#ef716a" text-anchor="middle">outage</text>
  <rect x="1408" y="592" width="92" height="26" rx="13" fill="#12281f" stroke="#1e4636" stroke-width="1"/><text x="1454" y="609" font-size="11" fill="#2fbf8c" text-anchor="middle">recovery</text>

  <!-- ===== CONSUMER (serving path) ===== -->
  <line x1="1420" y1="300" x2="1446" y2="300" stroke="#56c7e8" stroke-width="1.6" stroke-dasharray="4 4" marker-end="url(#ah)"/>
  <rect x="1448" y="232" width="200" height="150" rx="14" fill="#0e1521" stroke="#2f5763" stroke-width="1.2"/>
  <text x="1462" y="262" font-family="'Space Grotesk',Verdana,sans-serif" font-size="13" font-weight="600" fill="#56c7e8">Serving path</text>
  <text x="1462" y="286" font-size="12" fill="#9aa7b9">CloudFront (OAC &#183; ACM)</text>
  <text x="1462" y="308" font-size="12" fill="#9aa7b9">&#8594; Vanilla TS dashboard</text>
  <text x="1462" y="332" font-size="11" fill="#768396">reads S3 &#183; polls every 60s</text>
  <text x="1462" y="356" font-family="'JetBrains Mono',monospace" font-size="11" fill="#56c7e8">barometer.vinny.dev</text>

  <!-- ===== FOOTER / LEGEND ===== -->
  <line x1="240" y1="702" x2="282" y2="702" stroke="#56c7e8" stroke-width="3" stroke-linecap="round"/><text x="292" y="707" font-size="13" fill="#9aa7b9">data flow</text>
  <line x1="410" y1="702" x2="452" y2="702" stroke="#ec8b4f" stroke-width="3" stroke-linecap="round"/><text x="462" y="707" font-size="13" fill="#9aa7b9">AWS compute</text>
  <line x1="600" y1="702" x2="642" y2="702" stroke="#2fbf8c" stroke-width="3" stroke-linecap="round"/><text x="652" y="707" font-size="13" fill="#9aa7b9">storage</text>
  <line x1="740" y1="702" x2="782" y2="702" stroke="#ef716a" stroke-width="3" stroke-linecap="round"/><text x="792" y="707" font-size="13" fill="#9aa7b9">alerts</text>
  <text x="1006" y="707" font-size="13" fill="#768396">Single-writer Lambda &#183; adapters fail safe to &#8220;unknown&#8221; &#183; alerts fire on transitions only.</text>
</svg>
